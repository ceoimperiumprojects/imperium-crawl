# Imperium Core private benchmark targets.
#
# This file lives on the Data partition and must never be committed.
# Put only authorized/private targets here. Do not store cookies, API keys,
# bearer tokens, proxy credentials, or raw session payloads in this file.

[metadata]
schema_version = 1
name = "imperium-core-private-targets"

# ── S-Tier (10/10) — Prave anti-bot tvrđave ──────────────────────────────

[[targets]]
id = "real_battle_bestbuy"
kind = "real_battle"
url = "https://www.bestbuy.com"
protection = "akamai"
selector = "body"
expected_text_contains = "Best Buy"
api_discovery = true
api_expected_mode = "api_only"
api_seed_urls = ["https://www.bestbuy.com"]
api_max_endpoints = 20
requires_v8 = true
requires_auth = false
labels = ["private", "authorized", "anti-bot", "s-tier", "ecommerce"]

